name: Telegram Direct C++ Cloud Compiler

on:
  repository_dispatch:
    types: [telegram_trigger]

jobs:
  cloud_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Java JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android NDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

    - name: Write C++ Code From Telegram
      run: |
        mkdir -p jni
        echo '${{ github.event.client_payload.code }}' > jni/main.cpp

    - name: Create Android.mk File
      run: |
        cat << 'EOF' > jni/Android.mk
        LOCAL_PATH := $(call my-dir)
        include $(CLEAR_VARS)
        LOCAL_MODULE    := dynamic_bypass
        LOCAL_SRC_FILES := main.cpp
        LOCAL_LDLIBS    := -llog
        include $(BUILD_SHARED_LIBRARY)
        EOF

    - name: Create Application.mk File
      run: |
        cat << 'EOF' > jni/Application.mk
        APP_ABI := arm64-v8a
        APP_PLATFORM := android-21
        APP_STL := c++_static
        EOF

    - name: Run NDK Build
      run: |
        $ANDROID_NDK_HOME/ndk-build

    - name: Commit and Push Compiled Binary
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        mkdir -p libs
        cp -r obj/local/arm64-v8a/*.so libs/ || cp -r libs/arm64-v8a/*.so libs/ || true
        git add libs/
        git commit -m "Compiled .so binary from Telegram update" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
